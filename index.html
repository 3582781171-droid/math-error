<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学错题本 V1.6.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ==================== 顶部导航栏 ==================== -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                <h1 class="logo-text">数学错题本 <span class="version">V1.6.1</span></h1>
            </div>
            <p class="header-subtitle">记录错题，高效复习，稳步提升</p>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="main-container">

        <!-- ========== 数据统计卡片 ========== -->
        <section class="stats-section" id="statsSection">
            <div class="stat-card stat-total">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statTotal">0</span>
                    <span class="stat-label">错题总数</span>
                </div>
            </div>
            <div class="stat-card stat-mastered">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statMastered">0</span>
                    <span class="stat-label">已掌握</span>
                </div>
            </div>
            <div class="stat-card stat-unmastered">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statUnmastered">0</span>
                    <span class="stat-label">未掌握</span>
                </div>
            </div>
            <div class="stat-card stat-favorites">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statFavorites">0</span>
                    <span class="stat-label">收藏</span>
                </div>
            </div>
        </section>

        <!-- ========== 两栏布局：添加表单 + 搜索与列表 ========== -->
        <div class="content-grid">

            <!-- 左侧：添加错题表单 -->
            <aside class="form-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-title-icon">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        添加错题
                    </h2>
                </div>
                <form class="error-form" id="errorForm">

                    <!-- ===== 📷 拍照录题区域 ===== -->
                    <div class="ocr-section" id="ocrSection">
                        <div class="ocr-section-header">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ocr-section-icon">
                                <rect x="2" y="3" width="20" height="16" rx="2" ry="2"></rect>
                                <circle cx="12" cy="10" r="3"></circle>
                                <path d="M12 3v2"></path>
                                <path d="M12 19v2"></path>
                                <path d="M5 3v2"></path>
                                <path d="M19 3v2"></path>
                            </svg>
                            <span>📷 拍照录题</span>
                        </div>
                        <p class="ocr-section-hint">拍照或上传题目图片，自动识别题目内容</p>
                        <div class="ocr-buttons">
                            <button type="button" class="btn btn-ocr-camera" id="cameraBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                    <rect x="2" y="3" width="20" height="16" rx="2" ry="2"></rect>
                                    <circle cx="12" cy="10" r="3"></circle>
                                    <path d="M12 3v2"></path>
                                    <path d="M12 19v2"></path>
                                    <path d="M5 3v2"></path>
                                    <path d="M19 3v2"></path>
                                </svg>
                                📸 拍照
                            </button>
                            <button type="button" class="btn btn-ocr-upload" id="uploadBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                                🖼️ 相册/上传
                            </button>
                            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
                            <input type="file" id="galleryInput" accept="image/*" style="display:none;">
                        </div>
                    </div>

                    <!-- OCR 状态指示器 -->
                    <div class="ocr-status" id="ocrStatus" style="display:none;">
                        <div class="ocr-status-inner">
                            <div class="ocr-spinner" id="ocrSpinner">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ocr-spinner-icon">
                                    <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-linecap="round"></circle>
                                </svg>
                            </div>
                            <div class="ocr-status-text">
                                <span class="ocr-status-label" id="ocrStatusLabel">正在识别题目...</span>
                                <span class="ocr-status-progress" id="ocrStatusProgress"></span>
                            </div>
                        </div>
                        <div class="ocr-progress-bar" id="ocrProgressBar">
                            <div class="ocr-progress-fill" id="ocrProgressFill"></div>
                        </div>
                    </div>

                    <!-- OCR 图片预览 -->
                    <div class="ocr-preview" id="ocrPreview" style="display:none;">
                        <div class="ocr-preview-header">
                            <span class="ocr-preview-label">📷 题目照片</span>
                            <button type="button" class="ocr-preview-remove" id="ocrPreviewRemove" title="移除照片">×</button>
                        </div>
                        <img id="ocrPreviewImg" src="" alt="题目照片预览">
                        <div class="ocr-compress-stats" id="ocrCompressStats" style="display:none;">
                            <span class="ocr-compress-icon">📦</span>
                            <span class="ocr-compress-text" id="ocrCompressText"></span>
                        </div>
                    </div>

                    <!-- OCR 结果卡片（增强版） -->
                    <div class="ocr-result-card" id="ocrResultCard" style="display:none;">
                        <div class="ocr-result-header">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                            <span>✅ 识别完成</span>
                        </div>
                        <div class="ocr-result-body">
                            <div class="ocr-result-row">
                                <span class="ocr-result-label">识别标题</span>
                                <span class="ocr-result-value ocr-result-title" id="ocrResultTitle">-</span>
                            </div>
                            <div class="ocr-result-row">
                                <span class="ocr-result-label">识别知识点</span>
                                <span class="ocr-result-value ocr-result-kp" id="ocrResultKp">-</span>
                            </div>
                            <div class="ocr-result-row">
                                <span class="ocr-result-label">识别准确率</span>
                                <span class="ocr-result-value" id="ocrResultConfidence">-</span>
                            </div>
                            <div class="ocr-result-row">
                                <span class="ocr-result-label">识别原文</span>
                                <span class="ocr-result-value ocr-result-raw" id="ocrResultText">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- 题目 -->
                    <div class="form-group">
                        <label for="title" class="form-label">题目内容 <span class="required">*</span></label>
                        <textarea
                            id="title"
                            class="form-input form-textarea"
                            placeholder="请输入题目内容…（拍照后自动识别填充）"
                            rows="4"
                            required
                        ></textarea>
                    </div>

                    <!-- 科目 -->
                    <div class="form-group">
                        <label for="subject" class="form-label">科目 <span class="required">*</span></label>
                        <select id="subject" class="form-input form-select" required>
                            <option value="" disabled selected>请选择科目</option>
                            <option value="高等数学">高等数学</option>
                            <option value="线性代数">线性代数</option>
                            <option value="概率论">概率论</option>
                        </select>
                    </div>

                    <!-- 知识点 -->
                    <div class="form-group">
                        <label for="knowledgePoint" class="form-label">知识点 <span class="required">*</span>
                            <span class="auto-detect-badge" id="autoDetectBadge" style="display:none;">🤖 自动识别</span>
                        </label>
                        <input
                            type="text"
                            id="knowledgePoint"
                            class="form-input"
                            placeholder="例如：极限、导数、矩阵运算…（拍照后自动识别）"
                            required
                        />
                    </div>

                    <!-- 错误原因 -->
                    <div class="form-group">
                        <label for="errorReason" class="form-label">错误原因 <span class="required">*</span></label>
                        <textarea
                            id="errorReason"
                            class="form-input form-textarea"
                            placeholder="请描述错误原因，方便日后复习…"
                            rows="3"
                            required
                        ></textarea>
                    </div>

                    <!-- 题目图片（手动添加） -->
                    <div class="form-group">
                        <label class="form-label">附加图片 <span class="optional">(可选)</span></label>
                        <div class="image-upload-row">
                            <button type="button" class="btn btn-sm btn-secondary" id="addImageBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                                添加图片
                            </button>
                            <span class="image-hint">支持 JPG/PNG，自动压缩至 800px</span>
                            <input type="file" id="imageFileInput" accept="image/*" multiple style="display:none;">
                        </div>
                        <div class="image-preview-list" id="imagePreviewList"></div>
                    </div>

                    <!-- 难度 -->
                    <div class="form-group">
                        <label class="form-label">难度 <span class="required">*</span></label>
                        <div class="star-rating" id="starRating">
                            <button type="button" class="star-btn" data-star="1" title="很简单">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="2" title="较简单">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="3" title="中等">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="4" title="较难">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="5" title="很难">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                        </div>
                        <input type="hidden" id="difficulty" value="0" />
                        <span class="difficulty-hint" id="difficultyHint">请点击星星选择难度</span>
                    </div>

                    <!-- 隐藏的编辑 ID -->
                    <input type="hidden" id="editingId" value="" />

                    <!-- 按钮组 -->
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                <polyline points="7 3 7 8 15 8"></polyline>
                            </svg>
                            保存错题
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">
                            取消编辑
                        </button>
                    </div>
                </form>
            </aside>

            <!-- 右侧：搜索 + 错题列表 -->
            <section class="list-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-title-icon">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        错题列表
                    </h2>
                </div>

                <!-- 筛选与排序工具栏 -->
                <div class="filter-toolbar">
                    <div class="filter-row">
                        <select id="filterSubject" class="filter-select">
                            <option value="">📚 全部科目</option>
                            <option value="高等数学">高等数学</option>
                            <option value="线性代数">线性代数</option>
                            <option value="概率论">概率论</option>
                        </select>
                        <select id="filterDifficulty" class="filter-select">
                            <option value="">⭐ 全部难度</option>
                            <option value="1">★ 1星</option>
                            <option value="2">★★ 2星</option>
                            <option value="3">★★★ 3星</option>
                            <option value="4">★★★★ 4星</option>
                            <option value="5">★★★★★ 5星</option>
                        </select>
                        <select id="sortBy" class="filter-select">
                            <option value="newest">🕐 时间最新</option>
                            <option value="oldest">🕐 时间最旧</option>
                            <option value="difficulty-desc">🔥 难度最高</option>
                            <option value="difficulty-asc">💡 难度最低</option>
                        </select>
                    </div>
                    <div class="filter-extras">
                        <div class="status-filter-group" id="statusFilterGroup">
                            <button class="status-filter-btn active" data-status="all">📋 全部</button>
                            <button class="status-filter-btn" data-status="mastered">✅ 已掌握</button>
                            <button class="status-filter-btn" data-status="unmastered">🔄 未掌握</button>
                            <button class="status-filter-btn" data-status="favorites">❤️ 收藏</button>
                        </div>
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn btn-sm btn-review" id="startReviewBtn" title="随机复习未掌握错题">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                            开始复习
                        </button>
                        <button class="btn btn-sm btn-secondary" id="batchModeBtn" title="批量选择">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M9 11l3 3L22 4"></path>
                                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                            </svg>
                            批量
                        </button>
                        <button class="btn btn-sm btn-danger" id="batchDeleteBtn" style="display:none;" title="删除选中">
                            删除选中
                        </button>
                        <button class="btn btn-sm btn-secondary" id="exportBtn" title="导出JSON备份">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            导出
                        </button>
                        <button class="btn btn-sm btn-secondary" id="importBtn" title="从JSON文件导入">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="3 10 12 15 21 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            导入
                        </button>
                        <button class="btn btn-sm btn-danger" id="clearAllBtn" title="清空全部数据">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                            清空
                        </button>
                    </div>
                    <input type="file" id="importFileInput" accept=".json" style="display:none;">
                </div>

                <!-- 搜索框 -->
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="搜索题目或知识点…"
                    />
                    <button class="btn btn-sm btn-secondary" id="clearSearchBtn" style="display:none;">
                        清除
                    </button>
                </div>

                <!-- 列表容器 -->
                <div class="table-wrapper">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="empty-icon">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p class="empty-text">还没有错题记录</p>
                        <p class="empty-hint">在左侧表单添加你的第一道错题吧！</p>
                    </div>

                    <div class="error-list" id="errorList" style="display:none;">
                        <!-- 动态渲染 -->
                    </div>
                </div>

                <!-- 搜索结果提示 -->
                <p class="search-hint" id="searchHint" style="display:none;"></p>
            </section>
        </div>
    </main>

    <!-- ==================== 详情弹窗 ==================== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">错题详情</h3>
                <button class="modal-close" id="closeDetailModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="detailContent">
                <!-- 动态渲染 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeDetailBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- ==================== 删除确认弹窗 ==================== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-container modal-sm">
            <div class="modal-header modal-header-danger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="modal-warn-icon">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <h3 class="modal-title">确认删除</h3>
            </div>
            <div class="modal-body">
                <p class="delete-confirm-text">确定要删除这道错题吗？此操作不可撤销。</p>
                <p class="delete-preview" id="deletePreview"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- ==================== 图片查看器弹窗 ==================== -->
    <div class="modal-overlay" id="imageViewerModal">
        <div class="modal-container image-viewer-container">
            <div class="modal-header">
                <h3 class="modal-title" id="imageViewerTitle">图片预览</h3>
                <button class="modal-close" id="closeImageViewerModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body image-viewer-body">
                <img id="imageViewerImg" src="" alt="题目图片" style="width:100%; height:auto; border-radius:8px;">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeImageViewerBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- ==================== 随机复习弹窗 ==================== -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-container review-container">
            <div class="modal-header">
                <h3 class="modal-title">📝 随机复习</h3>
                <button class="modal-close" id="closeReviewModalTop">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body review-body" id="reviewBody">
                <!-- 进度指示区 -->
                <div class="review-progress-section" id="reviewProgressSection">
                    <div class="review-progress-info">
                        <span id="reviewProgressText">第 1 题 / 共 5 题</span>
                    </div>
                    <div class="review-progress-bar">
                        <div class="review-progress-fill" id="reviewProgressFill"></div>
                    </div>
                </div>

                <!-- 题目卡片 -->
                <div class="review-question-card" id="reviewQuestionCard">
                    <!-- 动态渲染 -->
                </div>

                <!-- 答案区域（默认隐藏） -->
                <div class="review-answer-section" id="reviewAnswerSection" style="display:none;">
                    <!-- 动态渲染 -->
                </div>

                <!-- 复习操作按钮 -->
                <div class="review-actions" id="reviewActions">
                    <button class="btn btn-secondary" id="reviewShowAnswerBtn">💡 显示答案</button>
                    <button class="btn btn-review-mastered" id="reviewMasteredBtn" style="display:none;">✅ 标记已掌握</button>
                    <button class="btn btn-primary" id="reviewNextBtn" style="display:none;">继续 ➡️</button>
                </div>

                <!-- 完成总结（默认隐藏） -->
                <div class="review-summary" id="reviewSummary" style="display:none;">
                    <!-- 动态渲染 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeReviewBtn">退出复习</button>
            </div>
        </div>
    </div>

    <!-- ==================== Toast 提示 ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ==================== 脚本 ==================== -->
    <!-- Tesseract.js OCR 引擎 (免费本地运行) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
