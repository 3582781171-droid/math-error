<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学错题本 V1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ==================== 顶部导航栏 ==================== -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                <h1 class="logo-text">数学错题本 <span class="version">V1.0</span></h1>
            </div>
            <p class="header-subtitle">记录错题，高效复习，稳步提升</p>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <main class="main-container">

        <!-- ========== 数据统计卡片 ========== -->
        <section class="stats-section" id="statsSection">
            <div class="stat-card stat-total">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statTotal">0</span>
                    <span class="stat-label">错题总数</span>
                </div>
            </div>
            <div class="stat-card stat-advanced">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statAdvanced">0</span>
                    <span class="stat-label">高等数学</span>
                </div>
            </div>
            <div class="stat-card stat-linear">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statLinear">0</span>
                    <span class="stat-label">线性代数</span>
                </div>
            </div>
            <div class="stat-card stat-probability">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="6"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                    </svg>
                </div>
                <div class="stat-info">
                    <span class="stat-number" id="statProbability">0</span>
                    <span class="stat-label">概率论</span>
                </div>
            </div>
        </section>

        <!-- ========== 两栏布局：添加表单 + 搜索与列表 ========== -->
        <div class="content-grid">

            <!-- 左侧：添加错题表单 -->
            <aside class="form-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-title-icon">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        添加错题
                    </h2>
                </div>
                <form class="error-form" id="errorForm">
                    <!-- 题目 -->
                    <div class="form-group">
                        <label for="title" class="form-label">题目 <span class="required">*</span></label>
                        <textarea
                            id="title"
                            class="form-input form-textarea"
                            placeholder="请输入题目内容…"
                            rows="4"
                            required
                        ></textarea>
                    </div>

                    <!-- 科目 -->
                    <div class="form-group">
                        <label for="subject" class="form-label">科目 <span class="required">*</span></label>
                        <select id="subject" class="form-input form-select" required>
                            <option value="" disabled selected>请选择科目</option>
                            <option value="高等数学">高等数学</option>
                            <option value="线性代数">线性代数</option>
                            <option value="概率论">概率论</option>
                        </select>
                    </div>

                    <!-- 知识点 -->
                    <div class="form-group">
                        <label for="knowledgePoint" class="form-label">知识点 <span class="required">*</span></label>
                        <input
                            type="text"
                            id="knowledgePoint"
                            class="form-input"
                            placeholder="例如：极限、导数、矩阵运算…"
                            required
                        />
                    </div>

                    <!-- 错误原因 -->
                    <div class="form-group">
                        <label for="errorReason" class="form-label">错误原因 <span class="required">*</span></label>
                        <textarea
                            id="errorReason"
                            class="form-input form-textarea"
                            placeholder="请描述错误原因，方便日后复习…"
                            rows="3"
                            required
                        ></textarea>
                    </div>

                    <!-- 难度 -->
                    <div class="form-group">
                        <label class="form-label">难度 <span class="required">*</span></label>
                        <div class="star-rating" id="starRating">
                            <button type="button" class="star-btn" data-star="1" title="很简单">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="2" title="较简单">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="3" title="中等">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="4" title="较难">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                            <button type="button" class="star-btn" data-star="5" title="很难">
                                <svg viewBox="0 0 24 24" class="star-icon">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                            </button>
                        </div>
                        <input type="hidden" id="difficulty" value="0" />
                        <span class="difficulty-hint" id="difficultyHint">请点击星星选择难度</span>
                    </div>

                    <!-- 隐藏的编辑 ID -->
                    <input type="hidden" id="editingId" value="" />

                    <!-- 按钮组 -->
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                <polyline points="7 3 7 8 15 8"></polyline>
                            </svg>
                            保存错题
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">
                            取消编辑
                        </button>
                    </div>
                </form>
            </aside>

            <!-- 右侧：搜索 + 错题列表 -->
            <section class="list-panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="panel-title-icon">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        错题列表
                    </h2>
                </div>

                <!-- 搜索框 -->
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="搜索题目或知识点…"
                    />
                    <button class="btn btn-sm btn-secondary" id="clearSearchBtn" style="display:none;">
                        清除
                    </button>
                </div>

                <!-- 列表容器 -->
                <div class="table-wrapper">
                    <div class="empty-state" id="emptyState">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="empty-icon">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <p class="empty-text">还没有错题记录</p>
                        <p class="empty-hint">在左侧表单添加你的第一道错题吧！</p>
                    </div>

                    <div class="error-list" id="errorList" style="display:none;">
                        <!-- 动态渲染 -->
                    </div>
                </div>

                <!-- 搜索结果提示 -->
                <p class="search-hint" id="searchHint" style="display:none;"></p>
            </section>
        </div>
    </main>

    <!-- ==================== 详情弹窗 ==================== -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">错题详情</h3>
                <button class="modal-close" id="closeDetailModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="detailContent">
                <!-- 动态渲染 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeDetailBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- ==================== 删除确认弹窗 ==================== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-container modal-sm">
            <div class="modal-header modal-header-danger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="modal-warn-icon">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <h3 class="modal-title">确认删除</h3>
            </div>
            <div class="modal-body">
                <p class="delete-confirm-text">确定要删除这道错题吗？此操作不可撤销。</p>
                <p class="delete-preview" id="deletePreview"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- ==================== Toast 提示 ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ==================== 脚本 ==================== -->
    <script src="script.js"></script>
</body>
</html>
